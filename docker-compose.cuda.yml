# GPU variant: rebuilds the services from Dockerfile.cuda (CUDA-enabled
# PyTorch, tagged recsys-atlas-cuda) and passes all NVIDIA devices into the
# containers. Usage: docker compose -f docker-compose.yml -f docker-compose.cuda.yml up --build web jupyter ide
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: recsys-atlas-cuda:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      RECSYS_CUDA_AVAILABLE: "1"

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: recsys-atlas-cuda:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all

  test:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: recsys-atlas-cuda:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all

  test-full:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: recsys-atlas-cuda:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all

  test-accuracy:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: recsys-atlas-cuda:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all

  test-cuda-accuracy:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: recsys-atlas-cuda:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      RECSYS_CUDA_AVAILABLE: "1"
