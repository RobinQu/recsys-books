services:
  web:
    build: .
    image: recsys-atlas:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      JUPYTER_PUBLIC_URL: http://localhost:8889
      IDE_PUBLIC_URL: http://localhost:8090
      RECSYS_RESOURCE_AUTO_DOWNLOAD: "0"
      RECSYS_CUDA_AVAILABLE: ${RECSYS_CUDA_AVAILABLE:-0}
    ports:
      - "8010:8000"
    volumes:
      - .:/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  jupyter:
    build: .
    image: recsys-atlas:latest
    command: >-
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser
      --allow-root
      --IdentityProvider.token=recsys --ServerApp.password=''
      --ServerApp.allow_remote_access=True
      --ServerApp.tornado_settings='{"headers":{"Content-Security-Policy":"frame-ancestors \u0027self\u0027 http://localhost:8010 http://127.0.0.1:8010"}}'
      --ServerApp.root_dir=/workspace
    ports:
      - "8889:8888"
    environment:
      RECSYS_PROFILE: full
    volumes:
      - .:/workspace

  ide:
    build:
      context: .
      dockerfile: Dockerfile.ide
    image: recsys-code-server:latest
    command: >-
      --bind-addr 0.0.0.0:8080 --auth none
      --disable-workspace-trust --disable-getting-started-override
      /home/coder/project
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - .:/home/coder/project

  test:
    build: .
    image: recsys-atlas:latest
    command: >-
      sh -c "python scripts/generate_chapter_code.py &&
      python scripts/generate_notebooks.py &&
      pytest -q &&
      python scripts/execute_notebooks.py --profile smoke &&
      python scripts/build_previews.py &&
      python scripts/verify_published_notebooks.py"
    environment:
      RECSYS_PROFILE: smoke
      PYTHONPATH: /workspace
    volumes:
      - .:/workspace

  test-full:
    profiles: ["full"]
    build: .
    image: recsys-atlas:latest
    command: >-
      sh -c "python scripts/init_resources.py --include-optional --strict --kind datasets
      --id movielens-latest-full --id movielens-1m-full --id movielens-20m-full
      --id amazon-books-5core --id amazon-books-2014-ratings
      --id amazon-electronics-5core --id census-income-kdd
      --id amazon-video-games-full --id kuairand-pure-full
      --id criteo-x1-full --id openonerec-recif &&
      RECSYS_PROFILE=full pytest -q -m full_data &&
      python scripts/generate_notebooks.py &&
      python scripts/execute_notebooks.py --profile full --only 5_2_dssm &&
      python scripts/execute_notebooks.py --profile full --only 5_3_mind &&
      python scripts/execute_notebooks.py --profile full --only 5_4_sasrec &&
      python scripts/execute_notebooks.py --profile full --only 6_3_din &&
      python scripts/execute_notebooks.py --profile full --only 6_4_dien &&
      python scripts/execute_notebooks.py --profile full --only 7_2_mmoe &&
      python scripts/execute_notebooks.py --profile full --only 7_3_ple &&
      python scripts/build_previews.py"
    environment:
      RECSYS_PROFILE: full
      PYTHONPATH: /workspace
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - .:/workspace

  test-accuracy:
    profiles: ["full"]
    build: .
    image: recsys-atlas:latest
    command: >-
      sh -c "python scripts/init_resources.py --include-optional --strict --kind datasets
      --id movielens-latest-full --id movielens-20m-full --id criteo-x1-full --id openonerec-recif &&
      RECSYS_PROFILE=full pytest -q -m 'full_data or accuracy'"
    environment:
      RECSYS_PROFILE: full
      PYTHONPATH: /workspace
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - .:/workspace

  test-cuda-accuracy:
    profiles: ["cuda"]
    build: .
    image: recsys-atlas:latest
    command: >-
      sh -c "python scripts/init_resources.py --include-optional --strict --kind datasets
      --id movielens-20m-full --id openonerec-recif &&
      RECSYS_PROFILE=full pytest -q -m cuda_accuracy"
    environment:
      RECSYS_PROFILE: full
      PYTHONPATH: /workspace
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - .:/workspace
