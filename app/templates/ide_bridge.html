<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ notebook.title }} · 源码 IDE</title>
  <style>
    html, body, iframe { width: 100%; height: 100%; margin: 0; border: 0; }
    body { overflow: hidden; background: #181818; font-family: system-ui, sans-serif; }
    .status { position: fixed; z-index: 2; top: 12px; left: 50%; transform: translateX(-50%); padding: 8px 14px; border-radius: 8px; color: #eee; background: rgba(20,20,20,.9); box-shadow: 0 4px 20px #0008; font-size: 13px; }
    .status.ready { opacity: 0; pointer-events: none; transition: opacity .4s 1s; }
    .status.error { color: #ffd3d3; }
  </style>
</head>
<body>
  <div id="status" class="status" role="status">正在启动 IDE，并定位到对应源码…</div>
  <iframe id="ide" title="{{ notebook.title }} 源码 IDE" src="{{ ide_url }}/?folder=/home/coder/project" allow="clipboard-read; clipboard-write"></iframe>
  <script>
    const status = document.getElementById('status');
    let attempts = 0;
    async function activateSource() {
      attempts += 1;
      try {
        const response = await fetch('/api/ide/{{ notebook.slug }}/open', { method: 'POST' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        status.textContent = '已打开本章节对应源码';
        status.className = 'status ready';
      } catch (error) {
        if (attempts < 30) {
          setTimeout(activateSource, 500);
        } else {
          status.textContent = 'IDE 已显示，但自动定位失败；请刷新本页重试。';
          status.className = 'status error';
        }
      }
    }
    document.getElementById('ide').addEventListener('load', () => setTimeout(activateSource, 500), { once: true });
    setTimeout(activateSource, 1800);
  </script>
</body>
</html>
