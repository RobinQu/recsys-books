<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 820 210">
<title id="title">MIND 多兴趣数据流</title>
<desc id="desc">行为序列经动态路由聚成 K 个兴趣向量，训练时按目标物品选择兴趣，推理时多路召回。</desc>
<style>
  .box{fill:#ffffff;stroke:#64748b;stroke-width:1.6}
  .core{fill:#eef2ff;stroke:#4f46e5}
  .out{fill:#ecfdf5;stroke:#059669}
  .lbl{fill:#1e293b;font:600 15px system-ui,-apple-system,sans-serif;text-anchor:middle}
  .sub{fill:#64748b;font:400 12.5px system-ui,-apple-system,sans-serif;text-anchor:middle}
  .arr{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#ah)}
  .cap{fill:#64748b;font:400 13px system-ui,-apple-system,sans-serif;text-anchor:start}
</style>
<defs><marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#64748b"/></marker></defs>

<rect class="box" x="20" y="56" width="150" height="64" rx="10"/>
<text class="lbl" x="95" y="82">行为序列</text>
<text class="sub" x="95" y="102">[B, L, d]</text>
<path class="arr" d="M170 88 H196"/>
<rect class="box core" x="200" y="56" width="180" height="64" rx="10"/>
<text class="lbl" x="290" y="82">动态路由胶囊</text>
<text class="sub" x="290" y="102">迭代 3 轮投票聚类</text>
<path class="arr" d="M380 88 H406"/>
<rect class="box" x="410" y="56" width="180" height="64" rx="10"/>
<text class="lbl" x="500" y="82">K 个兴趣向量</text>
<text class="sub" x="500" y="102">[B, K, d]</text>
<path class="arr" d="M590 88 H616"/>
<rect class="box out" x="620" y="56" width="180" height="64" rx="10"/>
<text class="lbl" x="710" y="82">K 路 ANN 召回</text>
<text class="sub" x="710" y="102">合并去重</text>

<text class="cap" x="20" y="152">路由一轮：softmax(b) 得权重 → 加权求和 s_k → squash 压缩 → 用 h·v 更新投票 b。</text>
<text class="cap" x="20" y="178">训练：目标物品做 label-aware attention 选出最相关兴趣；推理：K 个兴趣各自召回。</text>
</svg>
