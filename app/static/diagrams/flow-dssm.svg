<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 780 400">
<title id="title">DSSM 双塔数据流</title>
<desc id="desc">用户与物品各自经过独立的塔编码为向量，最后才计算余弦相似度与损失。</desc>
<style>
  .box{fill:#ffffff;stroke:#64748b;stroke-width:1.6}
  .tower{fill:#eef2ff;stroke:#4f46e5}
  .merge{fill:#ecfdf5;stroke:#059669}
  .lbl{fill:#1e293b;font:600 15px system-ui,-apple-system,sans-serif;text-anchor:middle}
  .sub{fill:#64748b;font:400 12.5px system-ui,-apple-system,sans-serif;text-anchor:middle}
  .arr{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#ah)}
  .cap{fill:#64748b;font:400 13px system-ui,-apple-system,sans-serif;text-anchor:start}
</style>
<defs><marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#64748b"/></marker></defs>

<rect class="box" x="50" y="24" width="230" height="46" rx="10"/>
<text class="lbl" x="165" y="52">用户特征 x_u</text>
<path class="arr" d="M165 70 V96"/>
<rect class="box tower" x="50" y="100" width="230" height="52" rx="10"/>
<text class="lbl" x="165" y="123">Embedding + MLP</text>
<text class="sub" x="165" y="142">用户塔（参数独立）</text>
<path class="arr" d="M165 152 V178"/>
<rect class="box" x="50" y="182" width="230" height="48" rx="10"/>
<text class="lbl" x="165" y="204">用户向量 u</text>
<text class="sub" x="165" y="222">形状 [B, d] · L2 归一化</text>

<rect class="box" x="500" y="24" width="230" height="46" rx="10"/>
<text class="lbl" x="615" y="52">物品特征 x_i</text>
<path class="arr" d="M615 70 V96"/>
<rect class="box tower" x="500" y="100" width="230" height="52" rx="10"/>
<text class="lbl" x="615" y="123">Embedding + MLP</text>
<text class="sub" x="615" y="142">物品塔（可离线预计算）</text>
<path class="arr" d="M615 152 V178"/>
<rect class="box" x="500" y="182" width="230" height="48" rx="10"/>
<text class="lbl" x="615" y="204">物品向量 v</text>
<text class="sub" x="615" y="222">形状 [N, d] · L2 归一化</text>

<path class="arr" d="M280 206 C 330 206 330 254 356 254"/>
<path class="arr" d="M500 206 C 450 206 450 254 424 254"/>
<rect class="box merge" x="280" y="254" width="220" height="52" rx="10"/>
<text class="lbl" x="390" y="276">余弦相似度 s = u·v</text>
<text class="sub" x="390" y="295">打分前两塔互不交叉</text>
<path class="arr" d="M390 306 V332"/>
<rect class="box" x="280" y="336" width="220" height="48" rx="10"/>
<text class="lbl" x="390" y="358">sampled softmax（温度 τ）</text>
<text class="sub" x="390" y="376">→ 交叉熵损失 L</text>
</svg>
