<!doctype html>
<html lang="zh-CN">
<head>

  <title>RecSys Atlas · 启动入口</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,"PingFang SC",system-ui,sans-serif;background:#0a0d0c;color:#f2f5ed}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 70% 10%,#253016 0,transparent 40%),#0a0d0c}.card{width:min(760px,calc(100% - 40px));padding:48px;border:1px solid #29322d;border-radius:18px;background:#111614}span{color:#c8ff61;font-size:12px;letter-spacing:.16em;font-weight:800}h1{font-size:clamp(40px,7vw,72px);letter-spacing:-.05em;line-height:1;margin:20px 0}p{color:#9ca89f;line-height:1.8;font-size:17px}a{display:inline-flex;margin-top:18px;padding:12px 18px;border-radius:9px;background:#c8ff61;color:#0a0d0c;text-decoration:none;font-weight:800}code{color:#c8ff61;background:#1c241f;padding:3px 7px;border-radius:5px}.hint{font-size:13px;margin-top:28px;border-top:1px solid #29322d;padding-top:22px}

<body><main class="card"><span>INTERACTIVE WEB APPLICATION</span><h1>RecSys Atlas</h1><p>这个文件现在是应用入口。首页直接进入每个大章的数学导读、独立算法教程和结果总结；共提供 27 个 Notebook 预览，交互执行由 JupyterLab 提供。</p><a href="http://localhost:8010">打开交互式应用 →</a><p class="hint">若页面尚未启动，请在本目录执行 <code>docker compose up --build web jupyter</code>。原始长报告保存在 <code>legacy_recsys_report.html</code>。</p></main></body>
</html>
